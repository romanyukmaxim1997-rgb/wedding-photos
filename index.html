<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 Anna & Maksym</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--gold:#8B9D6A;
--gold-light:#C8D5B9;
--gold-dark:#4A6741;
--cream:#F8F6F0;
--white:#FFFFFF;
--text:#2C2C2C;
--text-light:#6B6B6B;
--error:#E53E3E;
--success:#38A169;
}
body{
font-family:'Cormorant Garamond',serif;
background:var(--cream);
background-image:
radial-gradient(ellipse at 20% 50%,rgba(139,157,106,0.08) 0%,transparent 60%),
radial-gradient(ellipse at 80% 20%,rgba(139,157,106,0.06) 0%,transparent 50%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.card{
background:var(--white);
border-radius:20px;
padding:40px 36px;
max-width:480px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.10);
border:1px solid rgba(139,157,106,0.2);
position:relative;
overflow:hidden;
}
.card::before{
content:'';
position:absolute;
top:0;left:0;right:0;
height:4px;
background:linear-gradient(90deg,#4A6741,#8B9D6A,#E8D5A3,#C9A84C);
}
.card::after{
content:'';
position:absolute;
bottom:0;left:0;right:0;
height:2px;
background:linear-gradient(90deg,#C9A84C,#E8D5A3,#8B9D6A,#4A6741);
}

/* ===== ФОТО ПАРИ ===== */
.couple-photo-wrap{
display:flex;
justify-content:center;
margin-bottom:16px;
cursor:pointer;
}
.couple-photo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid var(--gold-light);
box-shadow:0 4px 20px rgba(139,157,106,0.3);
transition:transform 0.3s;
animation:float 1.5s ease-in-out infinite;
}
.couple-photo:hover{transform:scale(1.05)}
.emoji-ring{
font-size:3rem;
display:block;
margin-bottom:12px;
animation:float 1.5s ease-in-out infinite;
cursor:pointer;
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-16px)}
}

/* ===== LIGHTBOX ===== */
.photo-lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
z-index:3000;
align-items:center;
justify-content:center;
padding:20px;
animation:fadeIn 0.3s ease;
}
.photo-lightbox.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.photo-lightbox img{
max-width:90%;
max-height:85vh;
border-radius:16px;
object-fit:contain;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.lightbox-close{
position:absolute;
top:20px;right:20px;
color:white;
font-size:2rem;
cursor:pointer;
background:rgba(255,255,255,0.1);
border:none;
width:44px;height:44px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
transition:background 0.2s;
}
.lightbox-close:hover{background:rgba(255,255,255,0.2)}

.header{text-align:center;margin-bottom:8px}
.names{
font-size:2rem;
color:var(--text);
font-weight:400;
letter-spacing:3px;
font-family:'Cormorant Garamond',serif;
}
.names span{color:var(--gold)}
.date{
color:var(--text-light);
font-size:0.85rem;
margin-top:6px;
letter-spacing:4px;
font-family:'Montserrat',sans-serif;
font-weight:300;
}
.ornament{
text-align:center;
color:var(--gold);
font-size:1.2rem;
letter-spacing:8px;
margin:12px 0;
opacity:0.7;
}
.lang-switcher{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:16px;
flex-wrap:wrap;
}
.lang-btn{
padding:4px 10px;
border:1px solid var(--gold-light);
border-radius:20px;
background:transparent;
color:var(--text-light);
font-size:0.72rem;
cursor:pointer;
font-family:'Montserrat',sans-serif;
font-weight:400;
transition:all 0.2s;
}
.lang-btn.active{
background:var(--gold);
color:white;
border-color:var(--gold);
}
.subtitle{
color:var(--text-light);
font-size:1rem;
text-align:center;
line-height:1.6;
font-family:'Montserrat',sans-serif;
font-weight:300;
margin-bottom:16px;
}
.upload-area{
border:2px dashed var(--gold-light);
border-radius:16px;
padding:36px 20px;
text-align:center;
cursor:pointer;
transition:all 0.3s;
background:rgba(139,157,106,0.03);
margin-bottom:20px;
}
.upload-area:hover{
border-color:var(--gold);
background:rgba(139,157,106,0.08);
transform:scale(1.01);
}
.upload-icon{font-size:2.5rem;display:block;margin-bottom:12px}
.upload-title{
font-size:1.1rem;
color:var(--text);
margin-bottom:6px;
font-family:'Cormorant Garamond',serif;
font-weight:400;
}
.upload-hint{
font-size:0.75rem;
color:var(--text-light);
font-family:'Montserrat',sans-serif;
font-weight:300;
line-height:1.6;
word-break:break-word;
}
.upload-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.btn-option{
padding:14px 10px;
border:1.5px solid var(--gold-light);
border-radius:12px;
background:var(--white);
color:var(--text);
cursor:pointer;
transition:all 0.2s;
font-family:'Montserrat',sans-serif;
font-size:0.85rem;
font-weight:400;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}
.btn-option:hover{
border-color:var(--gold);
background:rgba(139,157,106,0.06);
transform:translateY(-2px);
}
.btn-option .icon{font-size:1.6rem}
.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:0.95rem;
cursor:pointer;
transition:all 0.25s;
font-family:'Montserrat',sans-serif;
font-weight:500;
letter-spacing:1px;
}
.btn-primary{
background:linear-gradient(135deg,var(--gold-dark),var(--gold));
color:var(--white);
box-shadow:0 4px 20px rgba(139,157,106,0.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(139,157,106,0.5)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.preview-container{display:none;margin-bottom:20px}
.preview-label{
font-size:0.72rem;
color:var(--text-light);
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:10px;
font-family:'Montserrat',sans-serif;
}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.preview-item{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--cream)}
.preview-item img,.preview-item video{width:100%;height:100%;object-fit:cover}
.remove-btn{
position:absolute;top:4px;right:4px;
width:22px;height:22px;
background:rgba(0,0,0,0.6);
color:white;border:none;border-radius:50%;
cursor:pointer;font-size:0.7rem;
display:flex;align-items:center;justify-content:center;
}
.progress-overlay{
position:absolute;inset:0;
background:rgba(0,0,0,0.5);
display:flex;flex-direction:column;
align-items:center;justify-content:center;
color:white;font-size:0.75rem;
font-family:'Montserrat',sans-serif;
}
.success-state{display:none;text-align:center;padding:20px 0}
.success-icon{
font-size:4rem;
display:block;
margin-bottom:16px;
animation:pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.success-title{
font-size:1.8rem;
color:var(--text);
margin-bottom:8px;
font-family:'Cormorant Garamond',serif;
font-weight:400;
}
.success-subtitle{
color:var(--text-light);
font-family:'Montserrat',sans-serif;
font-size:0.85rem;
font-weight:300;
line-height:1.8;
margin-bottom:24px;
}
.btn-more{
background:transparent;
border:1.5px solid var(--gold);
color:var(--gold-dark);
padding:12px 28px;
border-radius:12px;
cursor:pointer;
font-family:'Montserrat',sans-serif;
font-size:0.85rem;
font-weight:400;
transition:all 0.2s;
letter-spacing:1px;
}
.btn-more:hover{background:rgba(139,157,106,0.1)}

/* ===== ПІДПИС ===== */
.footer-sign{
text-align:center;
margin-top:24px;
padding-top:16px;
border-top:1px solid rgba(139,157,106,0.15);
color:var(--text-light);
font-family:'Cormorant Garamond',serif;
font-size:0.95rem;
font-style:italic;
}

/* ===== КОНФЕТІ ===== */
.confetti-piece{
position:fixed;
width:8px;
height:8px;
border-radius:2px;
top:-10px;
animation:confettiFall linear forwards;
z-index:9999;
pointer-events:none;
}
@keyframes confettiFall{
0%{transform:translateY(0) rotate(0deg);opacity:1}
100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

.toast{
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%) translateY(100px);
background:var(--text);color:white;
padding:12px 24px;border-radius:50px;
font-family:'Montserrat',sans-serif;
font-size:0.85rem;font-weight:400;
transition:transform 0.3s;z-index:2000;
white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
.spinner{
width:18px;height:18px;
border:2px solid rgba(255,255,255,0.3);
border-top-color:white;border-radius:50%;
animation:spin 0.8s linear infinite;
display:inline-block;margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
.card{padding:24px 16px}
.names{font-size:1.6rem}
.upload-buttons{grid-template-columns:1fr 1fr}
.upload-hint{font-size:0.68rem}
.btn-option{padding:12px 6px;font-size:0.78rem}
.btn-option .icon{font-size:1.3rem}
.subtitle{font-size:0.85rem}
.upload-title{font-size:1rem}
}
</style>
</head>
<body>

<div class="card">

<div class="header">
<!-- Якщо є фото пари — замінити src на посилання -->
<!-- <div class="couple-photo-wrap" onclick="openPhotoLightbox()">
<img class="couple-photo" src="photo.jpg" alt="Anna & Maksym">
</div> -->
<span class="emoji-ring">💍</span>
<h1 class="names">Anna <span>&</span> Maksym</h1>
<p class="date">01 · 08 · 2026</p>
</div>

<div class="ornament">✦ ✦ ✦</div>

<div class="lang-switcher" id="lang-switcher">
<button class="lang-btn" onclick="setLang('uk')">🇺🇦 UA</button>
<button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
<button class="lang-btn" onclick="setLang('cs')">🇨🇿 CS</button>
<button class="lang-btn" onclick="setLang('ru')">🇷🇺 RU</button>
</div>

<div id="uploader">
<p class="subtitle" id="txt-subtitle"></p>
<div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
<span class="upload-icon">📷</span>
<p class="upload-title" id="txt-drop"></p>
<p class="upload-hint" id="txt-hint"></p>
</div>
<div class="upload-buttons">
<button class="btn-option" onclick="openCamera()">
<span class="icon">📸</span>
<span id="txt-camera"></span>
</button>
<button class="btn-option" onclick="openGallery()">
<span class="icon">🖼️</span>
<span id="txt-gallery"></span>
</button>
</div>
<input type="file" id="file-input" accept="image/*,video/*" multiple style="display:none" onchange="handleFiles(this.files)">
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
<div class="preview-container" id="preview-container">
<p class="preview-label" id="txt-selected"></p>
<div class="preview-grid" id="preview-grid"></div>
</div>
<button class="btn btn-primary" id="upload-btn" onclick="uploadAll()" style="display:none">
<span id="txt-upload"></span>
</button>
</div>

<div class="success-state" id="success-state">
<span class="success-icon">🎉</span>
<h2 class="success-title" id="txt-thanks"></h2>
<p class="success-subtitle" id="txt-thanks-sub"></p>
<button class="btn-more" onclick="resetUploader()" id="txt-more"></button>
</div>

<div class="footer-sign" id="footer-sign">З любов'ю, Anna & Maksym ❤️</div>

</div>

<!-- Lightbox для фото пари -->
<div class="photo-lightbox" id="photo-lightbox" onclick="closePhotoLightbox()">
<button class="lightbox-close" onclick="closePhotoLightbox()">✕</button>
<img src="photo.jpg" alt="Anna & Maksym">
</div>

<div class="toast" id="toast"></div>

<script>
const translations={
uk:{
subtitle:'Поділіться моментами нашого свята 📸',
drop:'Натисніть або перетягніть фото',
hint:'до 20 фото або відео за раз · до 200 МБ кожен',
camera:'Зробити фото',
gallery:'З галереї',
selected:'Вибрані файли',
upload:'Завантажити фото 💛',
uploading:'Завантаження...',
thanks:'Дякуємо за фото!',
thanksSub:'Ваші спогади назавжди залишаться\nу нашому серці ❤️',
more:'+ Додати ще фото',
errorType:'Тільки фото та відео',
errorSize:'Файл більше 200 МБ',
errorUpload:'Помилка завантаження. Спробуйте ще раз.',
success:'Фото успішно завантажено! 🎉',
footer:'З любов\'ю, Anna & Maksym ❤️'
},
en:{
subtitle:'Share moments of our special day 📸',
drop:'Tap or drag photos here',
hint:'up to 20 photos or videos at once · up to 200 MB each',
camera:'Take a photo',
gallery:'From gallery',
selected:'Selected files',
upload:'Upload photos 💛',
uploading:'Uploading...',
thanks:'Thank you for the photos!',
thanksSub:'Your memories will stay in our hearts forever ❤️',
more:'+ Add more photos',
errorType:'Only photos and videos allowed',
errorSize:'File is larger than 200 MB',
errorUpload:'Upload failed. Please try again.',
success:'Photos uploaded successfully! 🎉',
footer:'With love, Anna & Maksym ❤️'
},
cs:{
subtitle:'Sdílejte momenty našeho svatebního dne 📸',
drop:'Klepněte nebo přetáhněte fotografie',
hint:'až 20 fotek nebo videí najednou · až 200 MB každý',
camera:'Vyfotit',
gallery:'Z galerie',
selected:'Vybrané soubory',
upload:'Nahrát fotografie 💛',
uploading:'Nahrávání...',
thanks:'Děkujeme za fotografie!',
thanksSub:'Vaše vzpomínky zůstanou navždy v našich srdcích ❤️',
more:'+ Přidat další fotografie',
errorType:'Pouze fotografie a videa',
errorSize:'Soubor je větší než 200 MB',
errorUpload:'Chyba nahrávání. Zkuste to znovu.',
success:'Fotografie úspěšně nahrány! 🎉',
footer:'S láskou, Anna & Maksym ❤️'
},
ru:{
subtitle:'Поделитесь моментами нашего праздника 📸',
drop:'Нажмите или перетащите фото',
hint:'до 20 фото или видео за раз · до 200 МБ каждый',
camera:'Сделать фото',
gallery:'Из галереи',
selected:'Выбранные файлы',
upload:'Загрузить фото 💛',
uploading:'Загрузка...',
thanks:'Спасибо за фото!',
thanksSub:'Ваши воспоминания навсегда останутся в нашем сердце ❤️',
more:'+ Добавить ещё фото',
errorType:'Только фото и видео',
errorSize:'Файл больше 200 МБ',
errorUpload:'Ошибка загрузки. Попробуйте ещё раз.',
success:'Фото успешно загружены! 🎉',
footer:'С любовью, Anna & Maksym ❤️'
}
};

const CLOUD_NAME='dndou5vpl';
const UPLOAD_PRESET='wedding-photos';
const MAX_SIZE=200*1024*1024;
const MAX_FILES=20;
const COUPLE_PHOTO='photo.jpg'; // замінити на посилання на фото

let currentLang='uk';
let selectedFiles=[];

function detectLang(){
const lang=navigator.language||navigator.userLanguage||'en';
const code=lang.substring(0,2).toLowerCase();
return translations[code]?code:'en';
}

function applyLang(lang){
const t=translations[lang];
document.getElementById('txt-subtitle').textContent=t.subtitle;
document.getElementById('txt-drop').textContent=t.drop;
document.getElementById('txt-hint').textContent=t.hint;
document.getElementById('txt-camera').textContent=t.camera;
document.getElementById('txt-gallery').textContent=t.gallery;
document.getElementById('txt-selected').textContent=t.selected;
document.getElementById('txt-upload').textContent=t.upload;
document.getElementById('txt-thanks').textContent=t.thanks;
document.getElementById('txt-thanks-sub').textContent=t.thanksSub;
document.getElementById('txt-more').textContent=t.more;
document.getElementById('footer-sign').textContent=t.footer;
}

function setLang(lang){
currentLang=lang;
applyLang(lang);
document.querySelectorAll('.lang-btn').forEach(btn=>{
btn.classList.remove('active');
if(btn.getAttribute('onclick').includes("'"+lang+"'")){
btn.classList.add('active');
}
});
}

function hideLang(){
document.getElementById('lang-switcher').style.display='none';
}
function showLang(){
document.getElementById('lang-switcher').style.display='flex';
}

// Ініціалізація
currentLang=detectLang();
applyLang(currentLang);
document.querySelectorAll('.lang-btn').forEach(btn=>{
if(btn.getAttribute('onclick').includes("'"+currentLang+"'")){
btn.classList.add('active');
}
});

// ===== LIGHTBOX ФОТО ПАРИ =====
function openPhotoLightbox(){
document.getElementById('photo-lightbox').classList.add('open');
}
function closePhotoLightbox(){
document.getElementById('photo-lightbox').classList.remove('open');
}

function openCamera(){
hideLang();
document.getElementById('camera-input').click();
}
function openGallery(){
hideLang();
document.getElementById('file-input').click();
}

const dropZone=document.getElementById('drop-zone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='var(--gold)'});
dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor='var(--gold-light)'});
dropZone.addEventListener('drop',e=>{
e.preventDefault();
dropZone.style.borderColor='var(--gold-light)';
hideLang();
handleFiles(e.dataTransfer.files);
});

function handleFiles(files){
const t=translations[currentLang];
Array.from(files).forEach(file=>{
if(!file.type.startsWith('image/')&&!file.type.startsWith('video/')){
showToast(t.errorType,'error');return;
}
if(file.size>MAX_SIZE){showToast(t.errorSize,'error');return;}
if(selectedFiles.length>=MAX_FILES)return;
selectedFiles.push(file);
});
renderPreviews();
}

function renderPreviews(){
const container=document.getElementById('preview-container');
const grid=document.getElementById('preview-grid');
const btn=document.getElementById('upload-btn');
if(selectedFiles.length===0){
container.style.display='none';
btn.style.display='none';
return;
}
container.style.display='block';
btn.style.display='block';
grid.innerHTML='';
selectedFiles.forEach((file,i)=>{
const item=document.createElement('div');
item.className='preview-item';
item.id=`prev-${i}`;
const url=URL.createObjectURL(file);
const isVideo=file.type.startsWith('video/');
item.innerHTML=`${isVideo?`<video src="${url}" muted playsinline></video>`:`<img src="${url}" alt="">`}<button class="remove-btn" onclick="removeFile(${i})">✕</button>`;
grid.appendChild(item);
});
}

function removeFile(i){selectedFiles.splice(i,1);renderPreviews();}

async function uploadAll(){
if(selectedFiles.length===0)return;
const t=translations[currentLang];
const btn=document.getElementById('upload-btn');
btn.disabled=true;
btn.innerHTML=`<span class="spinner"></span>${t.uploading}`;
try{
await Promise.all(selectedFiles.map((file,i)=>uploadToCloudinary(file,i)));
showSuccess();
}catch(err){
console.error(err);
showToast(t.errorUpload,'error');
btn.disabled=false;
btn.innerHTML=`<span id="txt-upload">${t.upload}</span>`;
}
}

function uploadToCloudinary(file,index){
return new Promise((resolve,reject)=>{
const formData=new FormData();
formData.append('file',file);
formData.append('upload_preset',UPLOAD_PRESET);
formData.append('folder','wedding-2026');
const xhr=new XMLHttpRequest();
xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
xhr.upload.onprogress=e=>{
if(e.lengthComputable){
const pct=Math.round((e.loaded/e.total)*100);
updateProgress(index,pct);
}
};
xhr.onload=()=>{
if(xhr.status===200)resolve(JSON.parse(xhr.responseText));
else reject(new Error(xhr.responseText));
};
xhr.onerror=()=>reject(new Error('Network error'));
xhr.send(formData);
});
}

function updateProgress(index,pct){
const item=document.getElementById(`prev-${index}`);
if(!item)return;
let overlay=item.querySelector('.progress-overlay');
if(!overlay){
overlay=document.createElement('div');
overlay.className='progress-overlay';
item.appendChild(overlay);
}
if(pct===100){
overlay.innerHTML='<span style="font-size:1.5rem">✓</span>';
overlay.style.background='rgba(56,161,105,0.7)';
}else{
overlay.innerHTML=`<span>${pct}%</span>`;
}
}

// ===== КОНФЕТІ =====
function launchConfetti(){
const colors=['#8B9D6A','#C8D5B9','#C9A84C','#E8D5A3','#4A6741','#ffffff'];
for(let i=0;i<80;i++){
setTimeout(()=>{
const piece=document.createElement('div');
piece.className='confetti-piece';
piece.style.left=Math.random()*100+'vw';
piece.style.background=colors[Math.floor(Math.random()*colors.length)];
piece.style.width=(Math.random()*8+4)+'px';
piece.style.height=(Math.random()*8+4)+'px';
piece.style.borderRadius=Math.random()>0.5?'50%':'2px';
piece.style.animationDuration=(Math.random()*2+2)+'s';
piece.style.animationDelay=Math.random()*0.5+'s';
document.body.appendChild(piece);
setTimeout(()=>piece.remove(),4000);
},i*30);
}
}

function showSuccess(){
document.getElementById('uploader').style.display='none';
document.getElementById('success-state').style.display='block';
showLang();
launchConfetti();
showToast(translations[currentLang].success,'success');
}

function resetUploader(){
selectedFiles=[];
document.getElementById('success-state').style.display='none';
document.getElementById('uploader').style.display='block';
showLang();
const btn=document.getElementById('upload-btn');
btn.style.display='none';
btn.disabled=false;
btn.innerHTML=`<span id="txt-upload">${translations[currentLang].upload}</span>`;
document.getElementById('preview-container').style.display='none';
document.getElementById('preview-grid').innerHTML='';
}

function showToast(msg,type=''){
const toast=document.getElementById('toast');
toast.textContent=msg;
toast.className=`toast ${type} show`;
setTimeout(()=>toast.classList.remove('show'),3500);
}
</script>
